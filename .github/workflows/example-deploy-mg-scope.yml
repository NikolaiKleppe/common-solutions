# Prerequisites:
# - Secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID
# Usage:
# - Example management-group-scope deployment workflow that runs plan and apply.
# - Keep workflow_dispatch for manual runs; use push path filters for automation.
# - Uses the no-gate environment by default for non-blocking apply.

name: Example - Deploy Management Group Scope

on:
  workflow_dispatch:
  push:
    paths:
      - terraform/gh-action-examples/deploy-mg-scope/**
      # - .github/workflows/**
      # - .github/actions/**

jobs:
  terraform:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/terraform-deploy-template.yml
    with:
      terraform_working_directory: terraform/gh-action-examples/deploy-mg-scope
      run_apply: true
      terraform_version: 1.15.5
      apply_environment_name: terraform-apply-no-gate

      backend_resource_group_name: rg-common-solutions-tfstate
      backend_storage_account_name: tfstatecommontc7iagly
      backend_subscription_id: c33f9068-3058-4127-a12d-d44382efa830
      backend_container_name: tfstate
      backend_key: common-solutions/gh-action-examples/deploy-mg-scope.tfstate

    secrets:
      azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}

