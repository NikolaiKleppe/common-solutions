name: Azure Terraform Plan Apply Template

on:
  workflow_call:
    inputs:
      terraform_working_directory:
        description: Terraform working directory relative to repository root
        required: true
        type: string

      terraform_version:
        description: Terraform version to install
        required: false
        default: "1.5.7"
        type: string

      tfvars_file:
        description: Optional tfvars file path relative to terraform_working_directory
        required: false
        default: ""
        type: string

      backend_resource_group_name:
        description: Azure resource group name for Terraform state storage
        required: true
        type: string

      backend_storage_account_name:
        description: Azure storage account name for Terraform state storage
        required: true
        type: string

      backend_subscription_id:
        description: Azure subscription ID hosting Terraform state storage (optional)
        required: false
        default: ""
        type: string

      backend_container_name:
        description: Azure blob container name for Terraform state storage
        required: true
        type: string

      backend_key:
        description: Terraform state key
        required: true
        type: string

      run_apply:
        description: Run Terraform apply when true
        required: false
        default: false
        type: boolean

    outputs:
      has_changes:
        description: True when terraform plan reports changes
        value: ${{ jobs.plan.outputs.has_changes }}

    secrets:
      azure_client_id:
        description: Azure application or managed identity client ID
        required: true

      azure_tenant_id:
        description: Azure tenant ID
        required: true

      azure_subscription_id:
        description: Azure subscription ID (optional for management group deployments)
        required: false

jobs:
  init:
    name: Init Component
    uses: ./.github/workflows/terraform-component-init.yml
    with:
      terraform_working_directory: ${{ inputs.terraform_working_directory }}
      terraform_version: ${{ inputs.terraform_version }}
      backend_resource_group_name: ${{ inputs.backend_resource_group_name }}
      backend_storage_account_name: ${{ inputs.backend_storage_account_name }}
      backend_subscription_id: ${{ inputs.backend_subscription_id }}
      backend_container_name: ${{ inputs.backend_container_name }}
      backend_key: ${{ inputs.backend_key }}

    secrets:
      azure_client_id: ${{ secrets.azure_client_id }}
      azure_tenant_id: ${{ secrets.azure_tenant_id }}
      azure_subscription_id: ${{ secrets.azure_subscription_id }}

  plan:
    name: Plan Component
    needs: init
    uses: ./.github/workflows/terraform-component-plan.yml
    with:
      terraform_working_directory: ${{ inputs.terraform_working_directory }}
      terraform_version: ${{ inputs.terraform_version }}
      tfvars_file: ${{ inputs.tfvars_file }}
      backend_resource_group_name: ${{ inputs.backend_resource_group_name }}
      backend_storage_account_name: ${{ inputs.backend_storage_account_name }}
      backend_subscription_id: ${{ inputs.backend_subscription_id }}
      backend_container_name: ${{ inputs.backend_container_name }}
      backend_key: ${{ inputs.backend_key }}
    secrets:
      azure_client_id: ${{ secrets.azure_client_id }}
      azure_tenant_id: ${{ secrets.azure_tenant_id }}
      azure_subscription_id: ${{ secrets.azure_subscription_id }}

  apply:
    name: Apply Component
    needs: plan
    if: ${{ inputs.run_apply }}
    uses: ./.github/workflows/terraform-component-apply.yml
    with:
      terraform_working_directory: ${{ inputs.terraform_working_directory }}
      terraform_version: ${{ inputs.terraform_version }}
      tfvars_file: ${{ inputs.tfvars_file }}
      backend_resource_group_name: ${{ inputs.backend_resource_group_name }}
      backend_storage_account_name: ${{ inputs.backend_storage_account_name }}
      backend_subscription_id: ${{ inputs.backend_subscription_id }}
      backend_container_name: ${{ inputs.backend_container_name }}
      backend_key: ${{ inputs.backend_key }}
      
    secrets:
      azure_client_id: ${{ secrets.azure_client_id }}
      azure_tenant_id: ${{ secrets.azure_tenant_id }}
      azure_subscription_id: ${{ secrets.azure_subscription_id }}