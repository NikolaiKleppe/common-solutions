name: Terraform Apply Template

on:
  workflow_call:
    inputs:
      terraform_working_directory:
        description: Terraform working directory relative to repository root
        required: true
        type: string

      terraform_version:
        description: Terraform version to install
        required: true
        type: string

      azure_subscription_id:
        description: Azure subscription ID for OIDC login (optional)
        required: false
        default: ""
        type: string

      tfvars_file:
        description: Optional tfvars file path relative to terraform_working_directory
        required: false
        default: ""
        type: string

      plan_file_name:
        description: Terraform plan filename written in terraform_working_directory
        required: false
        default: terraform.tfplan
        type: string

      plan_artifact_name:
        description: Artifact name used to retrieve the Terraform plan
        required: false
        default: terraform-plan
        type: string

      backend_resource_group_name:
        description: Azure resource group name for Terraform state storage
        required: true
        type: string

      backend_storage_account_name:
        description: Azure storage account name for Terraform state storage
        required: true
        type: string

      backend_subscription_id:
        description: Azure subscription ID hosting Terraform state storage (optional)
        required: false
        default: ""
        type: string

      backend_container_name:
        description: Azure blob container name for Terraform state storage
        required: true
        type: string

      backend_key:
        description: Terraform state key
        required: true
        type: string

      apply_environment_name:
        description: GitHub Environment name used to gate Terraform apply
        required: false
        default: terraform-apply
        type: string

    secrets:
      azure_client_id:
        description: Azure application or managed identity client ID
        required: true

      azure_tenant_id:
        description: Azure tenant ID
        required: true

jobs:
  apply:
   # name: Terraform Apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.apply_environment_name }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Terraform Init Component
        uses: ./.github/actions/terraform-component-init
        with:
          terraform_working_directory: ${{ inputs.terraform_working_directory }}
          terraform_version: ${{ inputs.terraform_version }}
          azure_client_id: ${{ secrets.azure_client_id }}
          azure_tenant_id: ${{ secrets.azure_tenant_id }}
          azure_subscription_id: ${{ inputs.azure_subscription_id }}
          backend_resource_group_name: ${{ inputs.backend_resource_group_name }}
          backend_storage_account_name: ${{ inputs.backend_storage_account_name }}
          backend_subscription_id: ${{ inputs.backend_subscription_id }}
          backend_container_name: ${{ inputs.backend_container_name }}
          backend_key: ${{ inputs.backend_key }}

      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.plan_artifact_name }}
          path: ${{ inputs.terraform_working_directory }}

      - name: Terraform Apply
        shell: bash
        run: |
          set -euo pipefail

          terraform -chdir="${{ inputs.terraform_working_directory }}" apply \
            -input=false \
            -auto-approve \
            "${{ inputs.plan_file_name }}"
