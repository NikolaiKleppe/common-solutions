name: Template - Terraform Plan

on:
  workflow_call:
    inputs:
      terraform_working_directory:
        description: Terraform working directory relative to repository root
        required: true
        type: string

      terraform_version:
        description: Terraform version to install
        required: true
        type: string

      azure_subscription_id:
        description: Azure subscription ID for OIDC login (optional)
        required: false
        default: ""
        type: string

      tfvars_file:
        description: Optional tfvars file path relative to terraform_working_directory
        required: false
        default: ""
        type: string

      plan_file_name:
        description: Terraform plan filename written in terraform_working_directory
        required: false
        default: terraform.tfplan
        type: string

      plan_artifact_name:
        description: Artifact name used to store the Terraform plan
        required: false
        default: terraform-plan
        type: string

      backend_resource_group_name:
        description: Azure resource group name for Terraform state storage
        required: true
        type: string

      backend_storage_account_name:
        description: Azure storage account name for Terraform state storage
        required: true
        type: string

      backend_subscription_id:
        description: Azure subscription ID hosting Terraform state storage (optional)
        required: false
        default: ""
        type: string

      backend_container_name:
        description: Azure blob container name for Terraform state storage
        required: true
        type: string

      backend_key:
        description: Terraform state key
        required: true
        type: string

    outputs:
      has_changes:
        description: True when terraform plan reports changes
        value: ${{ jobs.plan.outputs.has_changes }}

    secrets:
      azure_client_id:
        description: Azure application or managed identity client ID
        required: true

      azure_tenant_id:
        description: Azure tenant ID
        required: true

jobs:
  plan:
    #name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC with subscription)
        if: ${{ inputs.azure_subscription_id != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azure_client_id }}
          tenant-id: ${{ secrets.azure_tenant_id }}
          subscription-id: ${{ inputs.azure_subscription_id }}

      - name: Azure Login (OIDC without subscription)
        if: ${{ inputs.azure_subscription_id == '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azure_client_id }}
          tenant-id: ${{ secrets.azure_tenant_id }}
          allow-no-subscriptions: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Init
        shell: bash
        run: |
          set -euo pipefail

          backend_subscription_arg=()
          if [ -n "${{ inputs.backend_subscription_id }}" ]; then
            backend_subscription_arg+=("-backend-config=subscription_id=${{ inputs.backend_subscription_id }}")
          fi

          terraform -chdir="${{ inputs.terraform_working_directory }}" init \
            -input=false \
            -backend-config="resource_group_name=${{ inputs.backend_resource_group_name }}" \
            -backend-config="storage_account_name=${{ inputs.backend_storage_account_name }}" \
            "${backend_subscription_arg[@]}" \
            -backend-config="container_name=${{ inputs.backend_container_name }}" \
            -backend-config="key=${{ inputs.backend_key }}"

      - name: Terraform Validate
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir="${{ inputs.terraform_working_directory }}" validate

      - name: Terraform Plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          plan_file_path="${{ inputs.terraform_working_directory }}/${{ inputs.plan_file_name }}"

          tfvars_arg=()
          if [ -n "${{ inputs.tfvars_file }}" ]; then
            tfvars_arg+=("-var-file=${{ inputs.tfvars_file }}")
          fi

          set +e
          terraform -chdir="${{ inputs.terraform_working_directory }}" plan \
            -input=false \
            -detailed-exitcode \
            -out="${{ inputs.plan_file_name }}" \
            "${tfvars_arg[@]}"
          exit_code=$?
          set -e

          if [ "$exit_code" -eq 1 ]; then
            echo "Terraform plan failed."
            exit 1
          fi

          if [ "$exit_code" -eq 2 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render plan summary for PR comment
        id: show_plan
        if: github.event_name == 'pull_request' && steps.plan.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          plan_text_file="$(mktemp)"

          terraform -chdir="${{ inputs.terraform_working_directory }}" show \
            -no-color "${{ inputs.plan_file_name }}" > "$plan_text_file"

          plan_summary="$(awk '
            BEGIN {
              adds = ""
              changes = ""
              destroys = ""
            }

            /^  # / {
              line = $0
              sub(/^  # /, "", line)

              op = ""
              note = ""
              if (line ~ / will be created$/) {
                op = "add"
              } else if (line ~ / will be updated in-place$/) {
                op = "change"
              } else if (line ~ / will be destroyed$/) {
                op = "destroy"
              } else if (line ~ / must be replaced$/) {
                op = "change"
                note = " (recreate)"
              } else {
                next
              }

              addr = line
              sub(/ (will be created|will be updated in-place|will be destroyed|must be replaced)$/, "", addr)

              n = split(addr, parts, /\./)
              if (n < 2) {
                next
              }

              type = parts[n - 1]
              name = parts[n]

              icon = ""
              if (op == "add") {
                icon = "🟢"
              } else if (op == "change") {
                icon = "🟡"
              } else if (op == "destroy") {
                icon = "🔴"
              }

              output_line = sprintf("%s %s: resource \"%s\" \"%s\"%s", icon, toupper(op), type, name, note)

              if (op == "add") {
                adds = adds output_line "\n"
              } else if (op == "change") {
                changes = changes output_line "\n"
              } else if (op == "destroy") {
                destroys = destroys output_line "\n"
              }
            }

            END {
              if (adds != "") {
                printf "%s", adds
              }
              if (changes != "") {
                printf "%s", changes
              }
              if (destroys != "") {
                printf "%s", destroys
              }
            }
          ' "$plan_text_file")"

          if [ -z "$plan_summary" ]; then
            if grep -q '^No changes\.' "$plan_text_file"; then
              plan_summary="No changes. Infrastructure is up-to-date."
            else
              plan_summary="Plan output could not be summarized into add/change/destroy lines. Check workflow logs for full details."
            fi
          fi

          rm -f "$plan_text_file"

          delimiter="$(openssl rand -hex 8)"
          {
            echo "plan_summary<<${delimiter}"
            echo "$plan_summary"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Comment plan output on PR
        if: github.event_name == 'pull_request' && steps.plan.outcome == 'success'
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.show_plan.outputs.plan_summary }}
          WORKING_DIRECTORY: ${{ inputs.terraform_working_directory }}
        with:
          github-token: ${{ github.token }}
          script: |
            const workingDir  = process.env.WORKING_DIRECTORY || '';
            const marker      = `<!-- terraform-plan-pr-comment:${workingDir ? ':' + workingDir : ''} -->`;
            const heading     = '## 🔍 Terraform Plan Operations';
            const maxLength   = 65000;

            let planText = process.env.PLAN_OUTPUT || '(no plan output captured)';
            const truncated = planText.length > maxLength;
            if (truncated) {
              planText = planText.substring(0, maxLength);
            }

            const dirLine  = workingDir ? `\`📁 ${workingDir}\`\n\n` : '';
            const truncMsg = truncated
              ? '\n\n> ⚠️ **Output truncated** — plan exceeds comment size limit. Check the workflow logs for the full output.'
              : '';

            const body = [
              marker,
              `## 🔍 Terraform Plan Operations`,
              '',
              dirLine + `<details>`,
              `<summary>Show add/change/destroy summary</summary>`,
              '',
              '```hcl',
              planText,
              '```',
              '</details>',
              truncMsg,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.filter(c => {
              const body = c.body || '';
              const isBotUser = (c.user?.type || '').toLowerCase() === 'bot';
              const isActionsBot = (c.user?.login || '') === 'github-actions[bot]';
              const matchesWorkflow = body.includes(marker) && body.includes(heading);
              return matchesWorkflow && (isBotUser || isActionsBot);
            });

            for (const comment of existing) {
              await github.rest.issues.deleteComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: comment.id,
              });
            }

            if (existing.length > 0) {
              core.info(`Deleted ${existing.length} existing plan comment(s)`);
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            core.info('Created fresh plan comment');

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.plan_artifact_name }}
          path: ${{ inputs.terraform_working_directory }}/${{ inputs.plan_file_name }}
          if-no-files-found: error
