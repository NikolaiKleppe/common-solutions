# .github/actions/terraform-plan-render-summary/action.yml
#
# Composite action — Render a concise Terraform plan summary with one line per
# resource operation (ADD/CHANGE/DESTROY), suitable for PR comments.

name: Terraform Plan Render Summary
description: Renders one-line-per-resource Terraform plan operations from a binary plan file.

inputs:
  terraform_working_directory:
    description: Terraform working directory relative to repository root.
    required: true

  plan_file_name:
    description: Terraform binary plan filename in terraform_working_directory.
    required: false
    default: terraform.tfplan

outputs:
  plan_summary:
    description: One-line-per-resource operation summary.
    value: ${{ steps.render.outputs.plan_summary }}

runs:
  using: composite
  steps:
    - name: Render plan summary
      id: render
      shell: bash
      run: |
        set -euo pipefail
        plan_text_file="$(mktemp)"

        terraform -chdir="${{ inputs.terraform_working_directory }}" show \
          -no-color "${{ inputs.plan_file_name }}" > "$plan_text_file"

        plan_summary="$(awk '
          BEGIN {
            adds = ""
            changes = ""
            destroys = ""
          }

          /^  # / {
            line = $0
            sub(/^  # /, "", line)

            op = ""
            note = ""
            if (line ~ / will be created$/) {
              op = "add"
            } else if (line ~ / will be updated in-place$/) {
              op = "change"
            } else if (line ~ / will be destroyed$/) {
              op = "destroy"
            } else if (line ~ / must be replaced$/) {
              op = "change"
              note = " (recreate)"
            } else {
              next
            }

            addr = line
            sub(/ (will be created|will be updated in-place|will be destroyed|must be replaced)$/, "", addr)

            n = split(addr, parts, /\./)
            if (n < 2) {
              next
            }

            type = parts[n - 1]
            name = parts[n]

            icon = ""
            if (op == "add") {
              icon = "🟢"
            } else if (op == "change") {
              icon = "🟡"
            } else if (op == "destroy") {
              icon = "🔴"
            }

            output_line = sprintf("%s %s: resource \"%s\" \"%s\"%s", icon, toupper(op), type, name, note)

            if (op == "add") {
              adds = adds output_line "\n"
            } else if (op == "change") {
              changes = changes output_line "\n"
            } else if (op == "destroy") {
              destroys = destroys output_line "\n"
            }
          }

          END {
            if (adds != "") {
              printf "%s", adds
            }
            if (changes != "") {
              printf "%s", changes
            }
            if (destroys != "") {
              printf "%s", destroys
            }
          }
        ' "$plan_text_file")"

        if [ -z "$plan_summary" ]; then
          if grep -q '^No changes\.' "$plan_text_file"; then
            plan_summary="No changes. Infrastructure is up-to-date."
          else
            plan_summary="Plan output could not be summarized into add/change/destroy lines. Check workflow logs for full details."
          fi
        fi

        rm -f "$plan_text_file"

        # Use a random delimiter to safely handle any text in the plan output.
        delimiter="$(openssl rand -hex 8)"
        {
          echo "plan_summary<<${delimiter}"
          echo "$plan_summary"
          echo "${delimiter}"
        } >> "$GITHUB_OUTPUT"
