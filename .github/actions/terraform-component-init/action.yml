name: Terraform Component Init
description: Shared Terraform initialization with Azure OIDC login and backend config flags

inputs:
  terraform_working_directory:
    description: Terraform working directory relative to repository root
    required: true

  terraform_version:
    description: Terraform version to install
    required: false
    default: "1.15.0"

  azure_client_id:
    description: Azure application or managed identity client ID
    required: true

  azure_tenant_id:
    description: Azure tenant ID
    required: true

  azure_subscription_id:
    description: Azure subscription ID (optional for management group deployments)
    required: false
    default: ""

  backend_resource_group_name:
    description: Azure resource group name for Terraform state storage
    required: true

  backend_storage_account_name:
    description: Azure storage account name for Terraform state storage
    required: true

  backend_subscription_id:
    description: Azure subscription ID hosting Terraform state storage (optional)
    required: false
    default: ""
  backend_container_name:
    description: Azure blob container name for Terraform state storage
    required: true

  backend_key:
    description: Terraform state key
    required: true

runs:
  using: composite
  steps:
    - name: Azure Login (OIDC with subscription)
      if: ${{ inputs.azure_subscription_id != '' }}
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.azure_client_id }}
        tenant-id: ${{ inputs.azure_tenant_id }}
        subscription-id: ${{ inputs.azure_subscription_id }}

    - name: Azure Login (OIDC without subscription)
      if: ${{ inputs.azure_subscription_id == '' }}
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.azure_client_id }}
        tenant-id: ${{ inputs.azure_tenant_id }}
        allow-no-subscriptions: true

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Terraform Init
      shell: bash
      run: |
        set -euo pipefail

        backend_subscription_arg=()
        if [ -n "${{ inputs.backend_subscription_id }}" ]; then
          backend_subscription_arg+=("-backend-config=subscription_id=${{ inputs.backend_subscription_id }}")
        fi

        terraform -chdir="${{ inputs.terraform_working_directory }}" init \
          -input=false \
          -backend-config="resource_group_name=${{ inputs.backend_resource_group_name }}" \
          -backend-config="storage_account_name=${{ inputs.backend_storage_account_name }}" \
          "${backend_subscription_arg[@]}" \
          -backend-config="container_name=${{ inputs.backend_container_name }}" \
          -backend-config="key=${{ inputs.backend_key }}"