# .github/actions/terraform-plan-pr-comment/action.yml
#
# Composite action — Post or update a Terraform plan operation summary on a pull request.
#
# USAGE
# -----
# - uses: ./.github/actions/terraform-plan-pr-comment
#   with:
#     github_token: ${{ github.token }}
#     plan_output:  ${{ steps.show_plan.outputs.plan_summary }}
#     working_directory: terraform/my-stack
#
# The action manages a single comment per working directory per PR.
# On each run it deletes existing managed comment(s) and creates a fresh one,
# so the PR timeline timestamp reflects the latest plan run.
#
# PERMISSIONS REQUIRED (on the calling job)
# ------------------------------------------
# permissions:
#   pull-requests: write

name: Terraform Plan PR Comment
description: Recreates a Terraform plan operation summary comment on each pull request run.

inputs:
  github_token:
    description: GitHub token with pull-requests write permission (pass github.token).
    required: true

  plan_output:
    description: One-line-per-resource operation summary (add/change/destroy).
    required: true

  working_directory:
    description: >
      Terraform working directory shown in the comment header. Used as part of the
      unique marker so multiple stacks can each maintain their own comment.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Recreate PR plan comment
      uses: actions/github-script@v7
      env:
        # Pass potentially large multi-line text via env to avoid shell quoting issues.
        PLAN_OUTPUT: ${{ inputs.plan_output }}
        WORKING_DIRECTORY: ${{ inputs.working_directory }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const workingDir  = process.env.WORKING_DIRECTORY || '';
          const marker      = `<!-- terraform-plan-pr-comment:${workingDir ? ':' + workingDir : ''} -->`;
          const heading     = '## 🔍 Terraform Plan Operations';
          const maxLength   = 65000;

          let planText = process.env.PLAN_OUTPUT || '(no plan output captured)';
          const truncated = planText.length > maxLength;
          if (truncated) {
            planText = planText.substring(0, maxLength);
          }

          const dirLine  = workingDir ? `\`📁 ${workingDir}\`\n\n` : '';
          const truncMsg = truncated
            ? '\n\n> ⚠️ **Output truncated** — plan exceeds comment size limit. Check the workflow logs for the full output.'
            : '';

          const body = [
            marker,
            `## 🔍 Terraform Plan Operations`,
            '',
            dirLine + `<details>`,
            `<summary>Show add/change/destroy summary</summary>`,
            '',
            '```hcl',
            planText,
            '```',
            '</details>',
            truncMsg,
          ].join('\n');

          const { data: comments } = await github.rest.issues.listComments({
            owner:        context.repo.owner,
            repo:         context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.filter(c => {
            const body = c.body || '';
            const isBotUser = (c.user?.type || '').toLowerCase() === 'bot';
            const isActionsBot = (c.user?.login || '') === 'github-actions[bot]';
            const matchesWorkflow = body.includes(marker) && body.includes(heading);
            return matchesWorkflow && (isBotUser || isActionsBot);
          });

          for (const comment of existing) {
            await github.rest.issues.deleteComment({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              comment_id: comment.id,
            });
          }

          if (existing.length > 0) {
            core.info(`Deleted ${existing.length} existing plan comment(s)`);
          }

          await github.rest.issues.createComment({
            owner:        context.repo.owner,
            repo:         context.repo.repo,
            issue_number: context.issue.number,
            body,
          });
          core.info('Created fresh plan comment');
